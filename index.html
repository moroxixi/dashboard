
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;600&display=swap');
  .tn-root{background:#1a1b2e;min-height:600px;font-family:'Space Grotesk',sans-serif;color:#c0caf5;padding:0;position:relative;overflow:hidden}
  .tn-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:0}
  .tn-bar{background:#16172a;border-bottom:1px solid #292e42;padding:8px 16px;display:flex;align-items:center;gap:12px;position:relative;z-index:2}
  .tn-dot{width:10px;height:10px;border-radius:50%}
  .tn-dot.r{background:#f7768e}
  .tn-dot.y{background:#e0af68}
  .tn-dot.g{background:#9ece6a}
  .tn-bar-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#565f89;margin-left:8px;flex:1}
  .tn-bar-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:#7aa2f7}
  .tn-body{display:flex;min-height:560px;position:relative;z-index:1}
  .tn-sidebar{width:220px;background:#16172a;border-right:1px solid #292e42;padding:16px 0;flex-shrink:0}
  .tn-sidebar-header{padding:8px 16px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#565f89;letter-spacing:2px;text-transform:uppercase}
  .tn-bm-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:#a9b1d6;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s}
  .tn-bm-item:hover{background:rgba(122,162,247,0.08);color:#7aa2f7;border-left-color:#7aa2f7}
  .tn-bm-dot{width:5px;height:5px;border-radius:50%;background:#565f89;flex-shrink:0}
  .tn-bm-item:hover .tn-bm-dot{background:#7aa2f7}
  .tn-sidebar-sep{height:1px;background:#292e42;margin:12px 16px}
  .tn-main{flex:1;padding:20px;overflow:auto}
  .tn-topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .tn-prompt{font-family:'JetBrains Mono',monospace;font-size:12px;color:#9ece6a;margin-right:4px}
  .tn-search{flex:1;max-width:320px;background:#16172a;border:1px solid #292e42;border-radius:6px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#c0caf5;outline:none;transition:border-color 0.2s}
  .tn-search:focus{border-color:#7aa2f7}
  .tn-search::placeholder{color:#565f89}
  .tn-section-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#565f89;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .tn-section-label::after{content:'';flex:1;height:1px;background:#292e42}
  .tn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .tn-card{background:#16172a;border:1px solid #292e42;border-radius:8px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
  .tn-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background 0.2s}
  .tn-card:hover{border-color:#7aa2f7;transform:translateY(-2px)}
  .tn-card:hover::before{background:#7aa2f7}
  .tn-card.cat-a:hover::before{background:#bb9af7}
  .tn-card.cat-b:hover::before{background:#73daca}
  .tn-card.cat-c:hover::before{background:#f7768e}
  .tn-card.cat-d:hover::before{background:#e0af68}
  .tn-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .tn-card-icon{width:28px;height:28px;border-radius:5px;background:rgba(122,162,247,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;color:#7aa2f7}
  .tn-card.cat-a .tn-card-icon{background:rgba(187,154,247,0.15);color:#bb9af7}
  .tn-card.cat-b .tn-card-icon{background:rgba(115,218,202,0.15);color:#73daca}
  .tn-card.cat-c .tn-card-icon{background:rgba(247,118,142,0.15);color:#f7768e}
  .tn-card.cat-d .tn-card-icon{background:rgba(224,175,104,0.15);color:#e0af68}
  .tn-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:#1e2030;color:#565f89;border:1px solid #292e42;letter-spacing:1px;text-transform:uppercase}
  .tn-card-title{font-size:13px;font-weight:600;color:#c0caf5;margin:0 0 5px}
  .tn-card-desc{font-size:11px;color:#565f89;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tn-card-footer{margin-top:12px;display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#565f89;transition:color 0.2s}
  .tn-card:hover .tn-card-footer{color:#7aa2f7}
  .tn-card.cat-a:hover .tn-card-footer{color:#bb9af7}
  .tn-card.cat-b:hover .tn-card-footer{color:#73daca}
  .tn-card.cat-c:hover .tn-card-footer{color:#f7768e}
  .tn-loading{font-family:'JetBrains Mono',monospace;font-size:12px;color:#565f89;padding:40px 0;text-align:center}
  .tn-cursor{display:inline-block;width:8px;height:14px;background:#7aa2f7;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .tn-statusbar{background:#7aa2f7;padding:2px 12px;display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#1a1b2e;position:relative;z-index:2}
  .tn-statusbar-seg{padding:2px 8px;background:rgba(0,0,0,0.15);border-radius:2px}
  .tn-statusbar-sep{opacity:0.4}
  .tn-sb-right{margin-left:auto;display:flex;gap:8px}
</style>
<div class="tn-root">
  <div class="tn-scanlines"></div>
  <div class="tn-bar">
    <div class="tn-dot r"></div><div class="tn-dot y"></div><div class="tn-dot g"></div>
    <span class="tn-bar-title">rofi@arch  ~/dashboard  [hyprland]</span>
    <span class="tn-bar-time" id="tn-clock">00:00</span>
  </div>
  <div class="tn-body">
    <div class="tn-sidebar">
      <div class="tn-sidebar-header">bookmarks</div>
      <div id="tn-bm-list"><div class="tn-bm-item"><div class="tn-bm-dot"></div><span style="color:#565f89;font-family:'JetBrains Mono',monospace;font-size:11px">loading...</span></div></div>
      <div class="tn-sidebar-sep"></div>
      <div style="padding:8px 16px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#565f89;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">workspace</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#9ece6a;padding:4px 8px;background:rgba(158,206,106,0.08);border-radius:4px;border-left:2px solid #9ece6a">1 : dashboard</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#565f89;padding:4px 8px;border-radius:4px;border-left:2px solid transparent">2 : terminal</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#565f89;padding:4px 8px;border-radius:4px;border-left:2px solid transparent">3 : browser</div>
        </div>
      </div>
    </div>
    <div class="tn-main">
      <div class="tn-topbar">
        <span class="tn-prompt">❯</span>
        <input class="tn-search" id="tn-search" placeholder="search apps..." />
      </div>
      <div class="tn-section-label">projects</div>
      <div class="tn-grid" id="tn-grid">
        <div class="tn-loading">fetching nodes<span class="tn-cursor"></span></div>
      </div>
    </div>
  </div>
  <div class="tn-statusbar">
    <span class="tn-statusbar-seg">NORMAL</span>
    <span class="tn-statusbar-sep">|</span>
    <span>dashboard.html</span>
    <span class="tn-statusbar-sep">|</span>
    <span id="tn-count">0 apps</span>
    <div class="tn-sb-right">
      <span>Tokyo Night</span>
      <span class="tn-statusbar-sep">|</span>
      <span>UTF-8</span>
    </div>
  </div>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyDNzy0wf5MxcafkRuAW1icXq5oKdUPMM9Lfxy_U5CsGtQ7luBPZcdYss4ItWXrQBNE/exec";
const catMap = ['','cat-a','cat-b','cat-c','cat-d'];
const icons = ['<i class="ti ti-external-link"></i>','<i class="ti ti-box"></i>','<i class="ti ti-chart-bar"></i>','<i class="ti ti-device-mobile"></i>','<i class="ti ti-terminal"></i>'];
let allProjects = [];

function updateClock(){
  const d = new Date();
  document.getElementById('tn-clock').textContent = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(updateClock,1000);updateClock();

async function fetchData(){
  try{
    const r = await fetch(GAS_URL);
    const d = await r.json();
    allProjects = d.projects||[];
    renderProjects(allProjects);
    renderBookmarks(d.bookmarks||[]);
  }catch(e){
    document.getElementById('tn-grid').innerHTML='<div class="tn-loading" style="color:#f7768e">Error: connection refused</div>';
  }
}

function catIndex(cat,i){
  if(!cat) return (i%4)+1;
  const cats=['automation','dashboard','mobile','system','web'];
  const idx = cats.findIndex(c=>cat.toLowerCase().includes(c));
  return idx>=0?idx+1:(i%4)+1;
}

function renderProjects(projects){
  const grid = document.getElementById('tn-grid');
  if(!projects.length){grid.innerHTML='<div class="tn-loading">no results found</div>';return;}
  document.getElementById('tn-count').textContent = projects.length+' apps';
  grid.innerHTML = projects.map((p,i)=>{
    const ci = catIndex(p.category,i);
    const ic = icons[ci-1]||icons[0];
    return `<div class="tn-card cat-${['','a','b','c','d'][ci]}" onclick="window.open('${p.url}','_blank')">
      <div class="tn-card-top">
        <div class="tn-card-icon">${ic}</div>
        <span class="tn-badge">${p.category||'misc'}</span>
      </div>
      <div class="tn-card-title">${p.title}</div>
      <div class="tn-card-desc">${p.description||'—'}</div>
      <div class="tn-card-footer"><i class="ti ti-terminal-2" style="font-size:12px"></i>&nbsp;open&nbsp;→</div>
    </div>`;
  }).join('');
  if(window.lucide) lucide.createIcons();
}

function renderBookmarks(bms){
  const list = document.getElementById('tn-bm-list');
  if(!bms.length){list.innerHTML='<div class="tn-bm-item"><div class="tn-bm-dot"></div><span style="color:#565f89;font-size:11px;font-family:JetBrains Mono,monospace">empty</span></div>';return;}
  list.innerHTML = bms.map(bm=>`<a href="${bm.url}" target="_blank" style="text-decoration:none"><div class="tn-bm-item"><div class="tn-bm-dot"></div><span style="font-size:12px">${bm.title}</span></div></a>`).join('');
}

document.getElementById('tn-search').addEventListener('input',e=>{
  const q = e.target.value.toLowerCase();
  const filtered = allProjects.filter(p=>p.title.toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));
  renderProjects(filtered);
});

fetchData();
</script>
