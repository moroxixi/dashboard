
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .tn{background:#1a1b2e;min-height:620px;font-family:'Outfit',sans-serif;color:#c0caf5;position:relative;overflow:hidden}
  .tn-noise{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0}
  .tn-titlebar{background:#13141f;border-bottom:1px solid #24253a;padding:7px 14px;display:flex;align-items:center;gap:10px;position:relative;z-index:2}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot-r{background:#f7768e;box-shadow:0 0 6px #f7768e66}
  .dot-y{background:#e0af68;box-shadow:0 0 6px #e0af6866}
  .dot-g{background:#9ece6a;box-shadow:0 0 6px #9ece6a66}
  .tn-path{font-family:'JetBrains Mono',monospace;font-size:11px;color:#565f89;margin-left:6px;flex:1}
  .tn-path span{color:#9ece6a}
  .tn-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:#7aa2f7}
  .tn-body{display:flex;height:565px;position:relative;z-index:1}
  .tn-sidebar{width:200px;background:#13141f;border-right:1px solid #24253a;padding:14px 0;flex-shrink:0;overflow-y:auto}
  .tn-sb-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#3d4466;letter-spacing:3px;text-transform:uppercase;padding:0 14px 10px}
  .tn-bm{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:#7982a9;cursor:pointer;border-left:2px solid transparent;text-decoration:none;transition:all 0.12s}
  .tn-bm:hover{background:rgba(122,162,247,0.07);color:#c0caf5;border-left-color:#7aa2f7}
  .tn-bm-dot{width:4px;height:4px;border-radius:50%;background:#3d4466;flex-shrink:0;transition:background 0.12s}
  .tn-bm:hover .tn-bm-dot{background:#7aa2f7;box-shadow:0 0 4px #7aa2f7}
  .tn-sep{height:1px;background:#24253a;margin:10px 14px}
  .tn-ws-item{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 14px;color:#3d4466;border-left:2px solid transparent}
  .tn-ws-item.active{color:#9ece6a;border-left-color:#9ece6a;background:rgba(158,206,106,0.06)}
  .tn-main{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  .tn-toprow{display:flex;align-items:center;gap:10px}
  .tn-prompt{font-family:'JetBrains Mono',monospace;font-size:14px;color:#bb9af7;font-weight:700}
  .tn-search{flex:1;max-width:300px;background:#13141f;border:1px solid #24253a;border-radius:5px;padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#c0caf5;outline:none;transition:border-color 0.15s,box-shadow 0.15s}
  .tn-search:focus{border-color:#7aa2f7;box-shadow:0 0 0 3px rgba(122,162,247,0.1)}
  .tn-search::placeholder{color:#3d4466}
  .tn-sec{font-family:'JetBrains Mono',monospace;font-size:9px;color:#3d4466;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .tn-sec::after{content:'';flex:1;height:1px;background:#24253a}
  .tn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}

  /* THE CARD */
  .tn-card{background:#1e2035;border:1px solid #2a2c42;border-radius:10px;padding:14px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
  .tn-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s;border-radius:10px}
  .tn-card:hover{transform:translateY(-3px)}

  /* Accent line top */
  .tn-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0;opacity:0.85}

  /* Category color variants */
  .c-blue::before{background:linear-gradient(90deg,#7aa2f7,#2ac3de)}
  .c-purple::before{background:linear-gradient(90deg,#bb9af7,#7aa2f7)}
  .c-teal::before{background:linear-gradient(90deg,#73daca,#9ece6a)}
  .c-rose::before{background:linear-gradient(90deg,#f7768e,#ff9e64)}
  .c-amber::before{background:linear-gradient(90deg,#e0af68,#ff9e64)}

  .c-blue:hover{border-color:#7aa2f7;box-shadow:0 8px 24px rgba(122,162,247,0.12),0 0 0 1px rgba(122,162,247,0.15)}
  .c-purple:hover{border-color:#bb9af7;box-shadow:0 8px 24px rgba(187,154,247,0.12),0 0 0 1px rgba(187,154,247,0.15)}
  .c-teal:hover{border-color:#73daca;box-shadow:0 8px 24px rgba(115,218,202,0.12),0 0 0 1px rgba(115,218,202,0.15)}
  .c-rose:hover{border-color:#f7768e;box-shadow:0 8px 24px rgba(247,118,142,0.12),0 0 0 1px rgba(247,118,142,0.15)}
  .c-amber:hover{border-color:#e0af68;box-shadow:0 8px 24px rgba(224,175,104,0.12),0 0 0 1px rgba(224,175,104,0.15)}

  .tn-card-head{display:flex;align-items:flex-start;justify-content:space-between}
  .tn-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .c-blue .tn-icon{background:rgba(122,162,247,0.12);color:#7aa2f7}
  .c-purple .tn-icon{background:rgba(187,154,247,0.12);color:#bb9af7}
  .c-teal .tn-icon{background:rgba(115,218,202,0.12);color:#73daca}
  .c-rose .tn-icon{background:rgba(247,118,142,0.12);color:#f7768e}
  .c-amber .tn-icon{background:rgba(224,175,104,0.12);color:#e0af68}

  .tn-badge{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 7px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .c-blue .tn-badge{background:rgba(122,162,247,0.12);color:#7aa2f7;border:1px solid rgba(122,162,247,0.2)}
  .c-purple .tn-badge{background:rgba(187,154,247,0.12);color:#bb9af7;border:1px solid rgba(187,154,247,0.2)}
  .c-teal .tn-badge{background:rgba(115,218,202,0.12);color:#73daca;border:1px solid rgba(115,218,202,0.2)}
  .c-rose .tn-badge{background:rgba(247,118,142,0.12);color:#f7768e;border:1px solid rgba(247,118,142,0.2)}
  .c-amber .tn-badge{background:rgba(224,175,104,0.12);color:#e0af68;border:1px solid rgba(224,175,104,0.2)}

  .tn-card-title{font-size:13px;font-weight:700;color:#cdd6f4;letter-spacing:-0.2px;line-height:1.3}
  .tn-card-desc{font-size:11px;color:#565f89;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
  .tn-card-foot{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.5px;opacity:0;transform:translateY(3px);transition:opacity 0.15s,transform 0.15s}
  .tn-card:hover .tn-card-foot{opacity:1;transform:translateY(0)}
  .c-blue .tn-card-foot{color:#7aa2f7}
  .c-purple .tn-card-foot{color:#bb9af7}
  .c-teal .tn-card-foot{color:#73daca}
  .c-rose .tn-card-foot{color:#f7768e}
  .c-amber .tn-card-foot{color:#e0af68}

  .tn-statusbar{background:#7aa2f7;padding:3px 14px;display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#13141f;position:relative;z-index:2}
  .tn-sb-pill{background:rgba(0,0,0,0.2);padding:1px 8px;border-radius:3px;font-weight:700}
  .tn-sb-r{margin-left:auto;display:flex;gap:10px;opacity:0.75}
  .tn-empty{font-family:'JetBrains Mono',monospace;font-size:12px;color:#3d4466;padding:40px;text-align:center;grid-column:1/-1}
  .tn-cur{display:inline-block;width:7px;height:13px;background:#7aa2f7;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>

<div class="tn">
  <div class="tn-noise"></div>
  <div class="tn-titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <span class="tn-path"><span>rofi</span>@arch <span>~/dashboard</span> [hyprland]</span>
    <span class="tn-clock" id="clk">00:00:00</span>
  </div>
  <div class="tn-body">
    <div class="tn-sidebar">
      <div class="tn-sb-label">bookmarks</div>
      <div id="bm-list"><div class="tn-bm"><div class="tn-bm-dot"></div><span>loading<span class="tn-cur"></span></span></div></div>
      <div class="tn-sep"></div>
      <div class="tn-sb-label">workspace</div>
      <div class="tn-ws-item active">1 › dashboard</div>
      <div class="tn-ws-item">2 › terminal</div>
      <div class="tn-ws-item">3 › browser</div>
      <div class="tn-ws-item">4 › neovim</div>
    </div>
    <div class="tn-main">
      <div class="tn-toprow">
        <span class="tn-prompt">❯</span>
        <input class="tn-search" id="srch" placeholder="search apps..." />
      </div>
      <div class="tn-sec">projects</div>
      <div class="tn-grid" id="grid">
        <div class="tn-empty">fetching nodes<span class="tn-cur"></span></div>
      </div>
    </div>
  </div>
  <div class="tn-statusbar">
    <span class="tn-sb-pill">NORMAL</span>
    <span>dashboard.html</span>
    <span>·</span>
    <span id="cnt">0 apps</span>
    <div class="tn-sb-r"><span>Tokyo Night</span><span>·</span><span>UTF-8</span><span>·</span><span>LF</span></div>
  </div>
</div>

<script>
const GAS="https://script.google.com/macros/s/AKfycbyDNzy0wf5MxcafkRuAW1icXq5oKdUPMM9Lfxy_U5CsGtQ7luBPZcdYss4ItWXrQBNE/exec";
let all=[];

setInterval(()=>{
  const d=new Date();
  document.getElementById('clk').textContent=d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);

function catColor(cat,i){
  if(!cat) return ['c-blue','c-purple','c-teal','c-rose','c-amber'][i%5];
  const c=cat.toLowerCase();
  if(c.includes('mao')||c.includes('business')) return 'c-amber';
  if(c.includes('webapp')||c.includes('web')) return ['c-blue','c-purple','c-teal'][i%3];
  if(c.includes('mobile')) return 'c-rose';
  if(c.includes('misc')) return 'c-teal';
  return ['c-blue','c-purple','c-teal','c-rose','c-amber'][i%5];
}

function catIcon(cat,title){
  if(!cat&&!title) return 'ti-apps';
  const s=(cat+title).toLowerCase();
  if(s.includes('tracker')||s.includes('baby')) return 'ti-baby-carriage';
  if(s.includes('dashboard')||s.includes('chart')) return 'ti-chart-bar';
  if(s.includes('tiktok')||s.includes('social')) return 'ti-brand-tiktok';
  if(s.includes('mao')||s.includes('setoran')||s.includes('wonton')||s.includes('tempura')) return 'ti-bowl';
  if(s.includes('diary')||s.includes('life')) return 'ti-notebook';
  if(s.includes('notes')||s.includes('note')) return 'ti-note';
  if(s.includes('mp4')||s.includes('video')) return 'ti-video';
  if(s.includes('music')||s.includes('murottal')) return 'ti-music';
  if(s.includes('report')) return 'ti-report';
  if(s.includes('pekerjaan')||s.includes('task')||s.includes('job')) return 'ti-briefcase';
  if(s.includes('bridge')||s.includes('iphone')) return 'ti-device-mobile';
  if(s.includes('bot')||s.includes('ai')) return 'ti-robot';
  if(s.includes('github')) return 'ti-brand-github';
  if(s.includes('youtube')) return 'ti-brand-youtube';
  return 'ti-apps';
}

function render(projects){
  const grid=document.getElementById('grid');
  document.getElementById('cnt').textContent=projects.length+' apps';
  if(!projects.length){grid.innerHTML='<div class="tn-empty">no results found</div>';return;}
  grid.innerHTML=projects.map((p,i)=>{
    const col=catColor(p.category,i);
    const ico=catIcon(p.category||'',p.title||'');
    return `<div class="tn-card ${col}" onclick="window.open('${p.url}','_blank')">
      <div class="tn-card-head">
        <div class="tn-icon"><i class="ti ${ico}"></i></div>
        <span class="tn-badge">${p.category||'misc'}</span>
      </div>
      <div>
        <div class="tn-card-title">${p.title}</div>
        <div class="tn-card-desc">${p.description||'—'}</div>
      </div>
      <div class="tn-card-foot"><i class="ti ti-arrow-right" style="font-size:11px"></i> open app</div>
    </div>`;
  }).join('');
}

function renderBm(bms){
  const el=document.getElementById('bm-list');
  if(!bms.length){el.innerHTML='<div class="tn-bm"><div class="tn-bm-dot"></div><span style="color:#3d4466">empty</span></div>';return;}
  el.innerHTML=bms.map(b=>`<a class="tn-bm" href="${b.url}" target="_blank"><div class="tn-bm-dot"></div><span>${b.title}</span></a>`).join('');
}

async function init(){
  try{
    const r=await fetch(GAS);
    const d=await r.json();
    all=d.projects||[];
    render(all);
    renderBm(d.bookmarks||[]);
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="tn-empty" style="color:#f7768e">error: connection refused</div>';
  }
}

document.getElementById('srch').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  render(all.filter(p=>(p.title+' '+(p.description||'')).toLowerCase().includes(q)));
});

init();
</script>
