<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Animasi transisi sidebar */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans overflow-x-hidden">

    <!-- Tombol Hamburger (Fixed) -->
    <button id="menuBtn" class="fixed top-6 left-6 z-50 p-2 bg-white rounded-lg shadow-md hover:bg-gray-100">
        <i data-lucide="menu" class="w-6 h-6 text-gray-700"></i>
    </button>

    <!-- Overlay Sidebar -->
    <div id="overlay" class="fixed inset-0 bg-black/30 z-40 hidden"></div>

    <!-- Sidebar Section -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl sidebar-closed border-r border-gray-100">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="bookmark" class="w-5 h-5 text-blue-600"></i> Bookmarks
                </h2>
                <button id="closeBtn" class="p-1 hover:bg-gray-100 rounded">
                    <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
                </button>
            </div>
            
            <!-- Tempat List Bookmark -->
            <nav id="bookmarkList" class="space-y-2 overflow-y-auto max-h-[80vh]">
                <p class="text-sm text-gray-400">Loading bookmarks...</p>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <header class="bg-white shadow-sm py-8 mb-10 pl-20">
        <div class="max-w-6xl mx-auto px-4">
            <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
            <p class="text-gray-500 mt-2">Kumpulan aplikasi web dan portofolio pengembangan.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20 pl-4 md:pl-20">
        <div class="mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchBar" placeholder="Cari aplikasi..." 
                   class="w-full md:w-1/2 lg:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="appGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400">
                <p>Mengambil data dari database...</p>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyDNzy0wf5MxcafkRuAW1icXq5oKdUPMM9Lfxy_U5CsGtQ7luBPZcdYss4ItWXrQBNE/exec";

        // Logic Sidebar Toggle
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        menuBtn.onclick = toggleSidebar;
        closeBtn.onclick = toggleSidebar;
        overlay.onclick = toggleSidebar;

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                renderProjects(data.projects);
                renderBookmarks(data.bookmarks);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('appGrid').innerHTML = `<div class="col-span-full text-center text-red-500">Gagal memuat data.</div>`;
            }
        }

        function renderProjects(projects) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = ""; 

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer flex flex-col justify-between group";
                card.onclick = () => window.open(project.url, '_blank');

                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-3 bg-blue-50 text-blue-600 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i data-lucide="external-link" class="w-6 h-6"></i>
                            </div>
                            <span class="text-[10px] font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded uppercase tracking-tighter">
                                ${project.category || 'General'}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${project.title}</h3>
                        <p class="text-gray-500 text-sm mb-4 line-clamp-2">${project.description || ''}</p>
                    </div>
                    <div class="flex items-center text-blue-600 font-medium text-sm">
                        Buka Aplikasi <i data-lucide="chevron-right" class="ml-1 w-4 h-4"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function renderBookmarks(bookmarks) {
            const list = document.getElementById('bookmarkList');
            list.innerHTML = "";

            if (bookmarks.length === 0) {
                list.innerHTML = `<p class="text-xs text-gray-400">Belum ada bookmark.</p>`;
                return;
            }

            bookmarks.forEach(bm => {
                const a = document.createElement('a');
                a.href = bm.url;
                a.target = "_blank";
                a.className = "flex items-center gap-3 p-3 text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-all border border-transparent hover:border-blue-100";
                a.innerHTML = `
                    <i data-lucide="link-2" class="w-4 h-4"></i>
                    <span class="truncate font-medium">${bm.title}</span>
                `;
                list.appendChild(a);
            });
            lucide.createIcons();
        }

        fetchData();

        // Pencarian (Hanya di Grid Project)
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('#appGrid > div');
            cards.forEach(card => {
                const title = card.querySelector('h3')?.innerText.toLowerCase() || "";
                card.style.display = title.includes(searchTerm) ? "flex" : "none";
            });
        });
    </script>
</body>
</html>
